# Github Actions configuration file
# Build for Windows
name: Build Windows

on:
  push:
  pull_request:
  release:
    types:
      - created
      - edited
      - prereleased
      - released

permissions:
  contents: read

jobs:
  job:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        arch: [x86, x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: MSVC Environment Setup
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}
    - name: Create Buildsystem
      run: cmake -B build
    - name: Build
      run: cmake --build build
    - name: Test
      run: build/sig-net-selftest-cli.exe
    - name: List Built Files
      run: dir build/*
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.os }}
        path: |
          build/*
          !build/CMakeCache.txt
          !build/Makefile*
          !build/*.cmake
          !build/CMakeFiles/*
#    - name: Setup TMate Session (Failure Only)
#      if: ${{ failure() }}
#      uses: mxschmitt/action-tmate@v3