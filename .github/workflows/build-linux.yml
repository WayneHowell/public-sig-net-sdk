# Github Actions configuration file
# Build for Linux
name: Build Linux

on:
  push:
  pull_request:
  release:
    types:
      - created
      - edited
      - prereleased
      - released

permissions:
  contents: read

jobs:
  job:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Create Buildsystem
      run: cmake -B build
    - name: Build
      run: cmake --build build
    - name: Test
      run: build/sig-net-selftest-cli
    - name: List Built Files
      run: ls -al build/*
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.os }}
        path: |
          build/*
