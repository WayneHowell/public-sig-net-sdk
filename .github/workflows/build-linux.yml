# Github Actions configuration file
# Build for Linux
name: Build Linux

on:
  push:
  pull_request:
  release:
    types:
      - created
      - edited
      - prereleased
      - released

permissions:
  contents: read

jobs:
  job:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        arch: [x86, x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Create Buildsystem
      run: cmake -B build
    - name: Build
      run: cmake --build build
    - name: Root
      run: ls
    - name: CMake Folder
      run: ls CMakeFiles/
    - name: Prog Folder
      run: ls CMakeFiles/sig-net-selftest-cli.dir/
    - name: Test
      run: CMakeFiles/sig-net-selftest-cli.dir/sig-net-selftest-cli
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.os }}-${{ matrix.arch }}
        path: |
          build/*
